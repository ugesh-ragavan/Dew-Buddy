      </div>
    </div>

    <!-- Bento Grid Settings and Stats -->
    <div class="bento-grid">
      <!-- Water Card -->
      <div class="card timer-card water-card">
        <div class="card-header">
          <span class="icon">💧</span>
          <h2>Sip Water</h2>
        </div>
        <div class="circular-progress">
          <svg class="progress-ring" width="100" height="100">
            <circle class="progress-ring-bg" cx="50" cy="50" r="40" />
            <circle id="water-progress" class="progress-ring-fg water-color" cx="50" cy="50" r="40" stroke-dasharray="251.2" stroke-dashoffset="251.2" />
          </svg>
          <div class="time-label" id="water-time">--:--</div>
        </div>
        <div class="input-pill">
          <input type="number" id="water-interval" min="1" max="180" value="30">
          <span class="unit">min</span>
        </div>
      </div>

      <!-- Screen Break Card -->
      <div class="card timer-card break-card">
        <div class="card-header">
          <span class="icon">👀</span>
          <h2>Screen Rest</h2>
        </div>
        <div class="circular-progress">
          <svg class="progress-ring" width="100" height="100">
            <circle class="progress-ring-bg" cx="50" cy="50" r="40" />
            <circle id="screen-progress" class="progress-ring-fg break-color" cx="50" cy="50" r="40" stroke-dasharray="251.2" stroke-dashoffset="251.2" />
          </svg>
          <div class="time-label" id="screen-time">--:--</div>
        </div>
        <div class="input-pill">
          <input type="number" id="screen-interval" min="1" max="180" value="60">
          <span class="unit">min</span>
        </div>
      </div>
    </div>

    <!-- Stats & Mini Controls Card -->
    <div class="card stats-card">
      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-num" id="stat-water">0</span>
          <span class="stat-label">Glasses</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="stat-breaks">0</span>
          <span class="stat-label">Breaks</span>
        </div>
        <div class="stat-item">
          <span class="stat-num" id="stat-score">100%</span>
          <span class="stat-label">Dew Score</span>
        </div>
      </div>
      <div class="button-row">
        <button id="save-btn" class="pill-btn primary-btn">Update Timers</button>
        <button id="test-btn" class="pill-btn secondary-btn">Test Alert</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
